<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header id="header">
      <div id="env"></div>
      <nav>
        <button id="tab-stores" class="tab active">Stores</button>
        <button id="tab-component" class="tab">Component</button>
        <button id="tab-queries" class="tab">Queries</button>
      </nav>
      <div class="actions">
        <button id="pick">⌖ Element selector</button>
        <button id="highlight-updates">🔆 Highlight updates</button>
        <button id="rescan">↻ Rescan</button>
      </div>
    </header>
    <main>
      <section id="stores-view">
        <aside id="store-list"></aside>
        <div id="store-tree-pane">
          <div id="store-tree-toolbar">
            <input id="store-search" type="search" placeholder="Search keys…" />
            <button id="store-history-toggle">📜 History</button>
          </div>
          <div id="store-tree" class="tree-pane"></div>
        </div>
        <aside id="store-history-pane" hidden>
          <div id="store-history-header">
            <span>Action History</span>
            <button id="store-history-clear">Clear</button>
          </div>
          <div id="store-history-list"></div>
        </aside>
      </section>
      <section id="component-view" hidden>
        <aside id="component-tree-pane">
          <input id="component-search" type="search" placeholder="Search components…" />
          <div id="component-focus-bar" hidden>
            <span id="component-focus-label"></span>
            <button id="component-focus-clear">Show full tree</button>
          </div>
          <div id="component-tree"></div>
        </aside>
        <div id="component-detail"></div>
      </section>
      <section id="queries-view" hidden>
        <aside id="query-list-pane">
          <div id="query-list-toolbar">
            <input id="query-search" type="search" placeholder="Search queries…" />
            <div class="pill-toggle">
              <button id="query-kind-queries" class="pill active">Queries</button>
              <button id="query-kind-mutations" class="pill">Mutations</button>
            </div>
          </div>
          <div id="query-list"></div>
        </aside>
        <div id="query-detail"></div>
      </section>
    </main>
    <div id="toasts"></div>
    <script src="panel.js"></script>
  </body>
</html>
